name: AI Code Review

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

env:
  # Node version managed by actions/setup-node

jobs:
  ai-code-review:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changed
        run: |
          CHANGED=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD")
          echo "$CHANGED" > changed_files.txt
          COUNT=$(echo "$CHANGED" | wc -l)
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          echo "Changed files ($COUNT):"
          echo "$CHANGED"

      - name: AI Code Review
        id: review
        env:
          SENSENOVA_API_KEY: ${{ secrets.SENSENOVA_API_KEY }}
        run: |
          # ── Inline system prompt ──
          SYSTEM_PROMPT=$(cat << 'PROMPT_EOF'
Code Reviewer Agent

You are **Code Reviewer**, an expert who provides thorough, constructive code reviews. You focus on what matters — correctness, security, maintainability, and performance — not tabs vs spaces.

## 🧠 Your Identity & Memory
- **Role**: Code review and quality assurance specialist
- **Personality**: Constructive, thorough, educational, respectful
- **Memory**: You remember common anti-patterns, security pitfalls, and review techniques that improve code quality
- **Experience**: You've reviewed thousands of PRs and know that the best reviews teach, not just criticize

## 🎯 Your Core Mission

Provide code reviews that improve code quality AND developer skills:

1. **Correctness** — Does it do what it's supposed to?
2. **Security** — Are there vulnerabilities? Input validation? Auth checks?
3. **Maintainability** — Will someone understand this in 6 months?
4. **Performance** — Any obvious bottlenecks or N+1 queries?
5. **Testing** — Are the important paths tested?

## 🔧 Critical Rules

1. **Be specific** — "This could cause an SQL injection on line 42" not "security issue"
2. **Explain why** — Don't just say what to change, explain the reasoning
3. **Suggest, don't demand** — "Consider using X because Y" not "Change this to X"
4. **Prioritize** — Mark issues as 🔴 blocker, 🟡 suggestion, 💭 nit
5. **Praise good code** — Call out clever solutions and clean patterns
6. **One review, complete feedback** — Don't drip-feed comments across rounds

## 📋 Review Checklist

### 🔴 Blockers (Must Fix)
- Security vulnerabilities (injection, XSS, auth bypass)
- Data loss or corruption risks
- Race conditions or deadlocks
- Breaking API contracts
- Missing error handling for critical paths

### 🟡 Suggestions (Should Fix)
- Missing input validation
- Unclear naming or confusing logic
- Missing tests for important behavior
- Performance issues (N+1 queries, unnecessary allocations)
- Code duplication that should be extracted

### 💭 Nits (Nice to Have)
- Style inconsistencies (if no linter handles it)
- Minor naming improvements
- Documentation gaps
- Alternative approaches worth considering

## 📝 Review Comment Format

```
🔴 **Security: SQL Injection Risk**
Line 42: User input is interpolated directly into the query.

**Why:** An attacker could inject `'; DROP TABLE users; --` as the name parameter.

**Suggestion:**
- Use parameterized queries: `db.query('SELECT * FROM users WHERE name = $1', [name])`
```

## 💬 Communication Style
- Start with a summary: overall impression, key concerns, what's good
- Use the priority markers consistently
- Ask questions when intent is unclear rather than assuming it's wrong
- End with encouragement and next steps
PROMPT_EOF
          )

          REVIEW_FILE="review_output.md"
          : > "$REVIEW_FILE"
          HAS_REVIEW=false
          FILE_COUNT=0
          CHANGED_FILES=$(cat changed_files.txt)

          if [ -z "$CHANGED_FILES" ]; then
            echo "No files changed, skipping review." >> "$REVIEW_FILE"
          else
            while IFS= read -r FILE; do
              [ -z "$FILE" ] && continue
              echo "Reviewing: $FILE"

              # ── Get per-file diff ──
              DIFF=$(git diff "origin/${{ github.base_ref }}...HEAD" -- "$FILE" 2>/dev/null || true)
              if [ -z "$DIFF" ]; then
                echo "  [SKIP] $FILE — no diff (binary or unchanged)"
                continue
              fi

              # ── Checkif binary ──
              if echo "$DIFF" | head -1 | grep -q "^Binary files"; then
                echo "  [SKIP] $FILE — binary file"
                continue
              fi

              # ── Build user message ──
              USER_MSG="请 review 以下文件变更：\n\n文件: $FILE\n\n\`\`\`diff\n$DIFF\n\`\`\`"

              # ── Escape for JSON ──
              # Use jq to build the payload safely
              PAYLOAD=$(jq -n \
                --arg model "deepseek-v4-flash" \
                --arg system "$SYSTEM_PROMPT" \
                --arg user "$USER_MSG" \
                '{
                  model: $model,
                  messages: [
                    {role: "system", content: $system},
                    {role: "user", content: $user}
                  ],
                  stream: false
                }')

              # ── Call SenseNova API ──
              RESPONSE=$(curl -s -w "\n%{http_code}" \
                "https://token.sensenova.cn/v1/chat/completions" \
                -H "Authorization: Bearer $SENSENOVA_API_KEY" \
                -H "Content-Type: application/json" \
                -d "$PAYLOAD")

              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | sed '$d')

              if [ "$HTTP_CODE" != "200" ]; then
                echo "  [ERROR] HTTP $HTTP_CODE for $FILE"
                echo "  Response: $(echo "$BODY" | head -5)"
                continue
              fi

              # ── Extract review text from response ──
              REVIEW_TEXT=$(echo "$BODY" | jq -r '.choices[0].message.content // empty')
              if [ -z "$REVIEW_TEXT" ]; then
                echo "  [WARN] Empty response for $FILE"
                continue
              fi

              # ── Append to review output ──
              {
                echo "## 📁 \`$FILE\`"
                echo ""
                echo "$REVIEW_TEXT"
                echo ""
                echo "---"
                echo ""
              } >> "$REVIEW_FILE"

              HAS_REVIEW=true
              FILE_COUNT=$((FILE_COUNT + 1))
              echo "  [OK] Review completed for $FILE"

            done <<< "$CHANGED_FILES"
          fi

          # ── Final summary ──
          if [ "$HAS_REVIEW" = false ]; then
            cat > "$REVIEW_FILE" << 'EOF'
## 🤖 AI Code Review

No reviewable changes found (all files binary, unchanged, or empty).
EOF
          else
            SUMMARY=$(cat << EOF
# 🤖 AI Code Review

> 共审查 **${FILE_COUNT}** 个变更文件

EOF
)
            {
              echo "$SUMMARY"
              echo ""
              cat "$REVIEW_FILE"
            } > "${REVIEW_FILE}.tmp" && mv "${REVIEW_FILE}.tmp" "$REVIEW_FILE"
          fi

          echo "Review written to $REVIEW_FILE"

      - name: Post review comment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const reviewFile = 'review_output.md';

            if (!fs.existsSync(reviewFile)) {
              console.log('No review output file found, skipping comment.');
              return;
            }

            const reviewBody = fs.readFileSync(reviewFile, 'utf8').trim();
            if (!reviewBody) {
              console.log('Empty review output, skipping comment.');
              return;
            }

            const context = github.context;
            // For pull_request events, get the PR number
            let issueNumber;
            if (context.payload.pull_request) {
              issueNumber = context.payload.pull_request.number;
            } else {
              console.log('Not a pull request event, skipping comment.');
              return;
            }

            // Check if we already have a review comment from this workflow
            const comments = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              per_page: 100,
            });

            const botComment = comments.data.find(c =>
              c.user.type === 'Bot' &&
              c.body.startsWith('# 🤖 AI Code Review')
            );

            if (botComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: reviewBody,
              });
              console.log('Updated existing review comment.');
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                body: reviewBody,
              });
              console.log('Created new review comment.');
            }
